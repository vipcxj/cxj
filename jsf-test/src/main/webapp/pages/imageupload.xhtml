<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"     
      xmlns:h="http://xmlns.jcp.org/jsf/html" 
      xmlns:p="http://primefaces.org/ui"
      xmlns:cxj="http://cxj.com/jsf">
    <h:head>
        <title>Image Upload</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </h:head>
    <h:body>
        <h:form>
            <p:fileUpload mode="advanced" auto="true" allowTypes="/(\.|\/)(gif|jpe?g|png)$/" fileUploadListener="#{imageUploadBean.onImageUpload}" update="image"/>
            <p:graphicImage id="image" value="#{imageUploadBean.image}">
                <cxj:advancedRenderering value="true"/>
            </p:graphicImage>
            <p:commandLink value="back" action="#{imageUploadBean.back}"/>
        </h:form>
    </h:body>
</html>
